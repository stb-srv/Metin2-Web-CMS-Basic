<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News — Dragon Dark</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/themes/dragon-dark/css/dragon-dark.css">
    <link rel="stylesheet" href="/themes/dragon-dark/css/reset-classic.css">
    <script src="/js/theme.js"></script>
    
    <style>
        .news-article-wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
        }
        
        .article-hero {
            width: 100%;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 3rem;
            border: 1px solid var(--border);
            position: relative;
        }
        
        .article-hero img { width: 100%; height: 100%; object-fit: cover; }
        
        .article-badge {
            display: inline-block;
            background: rgba(212, 160, 23, 0.1);
            color: var(--gold-bright);
            padding: 0.4rem 1rem;
            border-radius: 4px;
            border: 1px solid var(--border);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }
        
        .article-body {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-primary);
        }
        
        .article-body h2, .article-body h3 {
            margin: 2.5rem 0 1rem;
            color: var(--gold-primary);
        }
        
        .article-meta {
            display: flex;
            gap: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="bg-overlay"></div>
    <div class="particles" id="particles-js"></div>

    <nav class="navbar"></nav>

    <main class="news-article-wrap">
        <div id="articleLoading" style="text-align: center; padding: 10rem;">
            <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--gold-primary);"></i>
        </div>

        <div id="articleContent" style="display: none;">
            <div id="articleHero"></div>
            
            <a href="/" class="btn secondary-btn" style="margin-bottom: 2rem;"><i class="fas fa-arrow-left"></i> Zurück</a>
            
            <div id="articleBadge" class="article-badge">News</div>
            <h1 id="articleTitle" style="font-size: 3.5rem; line-height: 1.1; margin-bottom: 1.5rem;"></h1>
            
            <div class="article-meta" id="articleMeta"></div>
            
            <div class="article-body" id="articleBody"></div>
            
            <div style="margin-top: 5rem; border-top: 1px solid var(--border); padding-top: 3rem; text-align: center;">
                <a href="/" class="btn primary-btn"><i class="fas fa-home"></i> Zurück zum Hauptportal</a>
            </div>
        </div>

        <div id="articleError" style="display: none; text-align: center; padding: 10rem;">
            <h2 style="margin-bottom: 2rem;">Artikel im Nebel verloren</h2>
            <a href="/" class="btn primary-btn">Zurückkehren</a>
        </div>
    </main>

    <footer class="dynamic-footer"></footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="/themes/dragon-dark/js/dragon-navbar.js"></script>
    <script src="/themes/dragon-dark/js/dragon-theme.js"></script>
    
    <script src="/js/core/modal.js"></script>
    <script src="/js/core/i18n.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/core/state.js"></script>
    <script src="/js/core/auth.js"></script>
    <script src="/js/core/main.js"></script>
    <script src="/js/core/footer.js"></script>
    <script src="/js/core/cms.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const parts = window.location.pathname.split('/').filter(Boolean);
            const id = parts[parts.length - 1];
            if (!id || isNaN(id)) return showError();

            try {
                const res = await fetch(`/api/cms/news/${id}`);
                const data = await res.json();
                if (data.success) renderArticle(data.item);
                else showError();
            } catch (e) { showError(); }
        });

        function renderArticle(item) {
            if (item.image_url) {
                document.getElementById('articleHero').innerHTML = `<div class="article-hero"><img src="${item.image_url}"></div>`;
            }
            document.getElementById('articleBadge').innerText = item.category || 'Chronik';
            document.getElementById('articleTitle').innerText = item.title;
            
            const date = new Date(item.created_at).toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' });
            document.getElementById('articleMeta').innerHTML = `
                <span><i class="fas fa-calendar-alt"></i> ${date}</span>
                <span><i class="fas fa-user"></i> ${item.author || 'Drachenwächter'}</span>
            `;
            
            document.getElementById('articleBody').innerHTML = item.content;
            
            document.getElementById('articleLoading').style.display = 'none';
            document.getElementById('articleContent').style.display = 'block';
        }

        function showError() {
            document.getElementById('articleLoading').style.display = 'none';
            document.getElementById('articleError').style.display = 'block';
        }
    </script>
</body>

</html>
