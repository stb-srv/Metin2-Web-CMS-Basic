<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Dark | Schwarzmarkt</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/themes/dragon-dark/css/dragon-dark.css">
    <link rel="stylesheet" href="/themes/dragon-dark/css/reset-classic.css">
    <script src="/js/theme.js"></script>
</head>

<body>
    <div class="bg-overlay"></div>
    <div class="particles" id="particles-js"></div>

    <nav class="navbar"></nav>

    <main class="container" style="padding: 4rem 1.5rem;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem; border-bottom: 1px solid var(--border); padding-bottom: 2rem;">
            <div>
                <h1 style="font-size: 3rem; margin-bottom: 0.5rem;">Der <span class="gradient-text">Schwarzmarkt</span></h1>
                <p style="color: var(--text-secondary); font-size: 1.1rem;">Erwerbe epische Gegenstände, um deine Macht in der Spielwelt zu festigen.</p>
            </div>
            
            <div class="glass-panel" style="padding: 1rem 2rem; display: flex; gap: 3rem; border-radius: 12px;">
                <div style="text-align: center;">
                    <span style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px;">Guthaben (DR)</span>
                    <strong style="font-size: 1.5rem; color: var(--gold-bright);">
                        <i class="fas fa-coins"></i> <span id="shopCoins">0</span>
                    </strong>
                </div>
                <div style="text-align: center;">
                    <span style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px;">Marken (DM)</span>
                    <strong style="font-size: 1.5rem; color: var(--blue-glow);">
                        <i class="fas fa-certificate"></i> <span id="shopCash">0</span>
                    </strong>
                </div>
            </div>
        </div>

        <!-- Filter & Search -->
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; margin-bottom: 3rem;">
            <div class="input-group" style="margin-bottom: 0;">
                <i class="fas fa-search"></i>
                <input type="text" id="shopSearchInput" placeholder="Suchen..." onkeyup="applyShopFilters()">
            </div>
            
            <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;" id="currencyFilters">
                <button class="btn secondary-btn filter-btn active" data-cur="ALL">Alle Artefakte</button>
                <button class="btn secondary-btn filter-btn" data-cur="DR"><i class="fas fa-coins text-gold"></i> Drachenmünzen</button>
                <button class="btn secondary-btn filter-btn" data-cur="DM"><i class="fas fa-certificate text-magic"></i> Drachenmarken</button>
            </div>
        </div>

        <div class="shop-grid" id="shopGrid">
            <!-- Items injected via JS -->
            <div style="grid-column: 1/-1; text-align: center; padding: 5rem;">
                <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--gold-primary);"></i>
                <p style="margin-top: 1.5rem; color: var(--text-secondary);">Lade Schwarzmarkt-Inhalte...</p>
            </div>
        </div>
    </main>

    <!-- Modal for Purchase -->
    <div id="buyModal" class="modal-overlay" style="display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center;">
        <div class="glass-panel modal-content" style="width: 450px; padding: 3rem; text-align: center;">
            <h2 id="modalItemName" style="margin-bottom: 2rem;">Item Name</h2>
            
            <div class="item-icon-wrapper" style="width: 120px; height: 120px; margin-bottom: 2rem;">
                <i class="fas fa-box-open" style="font-size: 3rem; color: var(--gold-bright);"></i>
            </div>
            
            <div id="modalItemDetails" style="display:none; margin-bottom: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;"></div>
            
            <p style="margin-bottom: 2.5rem; color: var(--text-secondary);">Bist du bereit, dieses Artefakt zu erwerben?</p>

            <div style="background: rgba(0,0,0,0.4); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span>Preis:</span>
                    <strong style="color: var(--gold-bright); font-size: 1.25rem;" id="modalItemPriceText">
                        <i class="fas fa-coins"></i> <span id="modalItemPrice">0</span>
                    </strong>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 0.9rem;">Lieferort:</span>
                    <select id="buyDestination" style="background: var(--bg-deep); border: 1px solid var(--border); color: #fff; padding: 0.5rem; border-radius: 6px; font-family: inherit;">
                        <option value="MALL">Ingame-Lager</option>
                        <option value="WEB">Web-Lager</option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <button class="btn secondary-btn" onclick="closeBuyModal()">Abbrechen</button>
                <button class="btn primary-btn" id="confirmBuyBtn">Kaufen</button>
            </div>
        </div>
    </div>

    <footer class="dynamic-footer"></footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="/themes/dragon-dark/js/dragon-navbar.js"></script>
    <script src="/themes/dragon-dark/js/dragon-theme.js"></script>
    
    <script src="js/core/modal.js"></script>
    <script src="js/core/i18n.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/shop.js"></script>
    <script src="js/core/main.js"></script>
    <script src="js/core/footer.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('m2user'));
            if (!user) {
                customAlert('Du musst eingeloggt sein, um den Schwarzmarkt zu betreten!', 'Zutritt verweigert');
                document.getElementById('globalModalOkBtn').onclick = () => window.location.href = '/';
                return;
            }
            document.getElementById('shopCoins').innerText = user.coins || 0;
            document.getElementById('shopCash').innerText = user.cash || 0;
            loadShopItems();
        });
    </script>
</body>

</html>
