<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Dark | Web-Lager</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/themes/dragon-dark/css/dragon-dark.css">
    <link rel="stylesheet" href="/themes/dragon-dark/css/reset-classic.css">
    <script src="/js/theme.js"></script>
    
    <style>
        .stash-tab-btn {
            background: rgba(13, 22, 40, 0.4);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .stash-tab-btn.active {
            background: rgba(212, 160, 23, 0.15);
            border-color: var(--gold-bright);
            color: var(--gold-bright);
            font-weight: 700;
        }
        
        .item-card {
            position: relative;
            background: linear-gradient(160deg, #0F1E35, #0A1020);
            border: 1px solid var(--border);
            padding: 1.5rem;
            text-align: center;
        }
        
        .item-checkbox-container {
            position: absolute;
            top: 10px;
            left: 10px;
        }
        
        .custom-checkbox {
            width: 18px;
            height: 18px;
            accent-color: var(--gold-primary);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="bg-overlay"></div>
    <div class="particles" id="particles-js"></div>

    <nav class="navbar"></nav>

    <main class="container" style="padding: 4rem 1.5rem; min-height: 85vh;">
        <div class="glass-panel" style="margin-bottom: 2rem; padding: 3rem; text-align: center;">
            <i class="fas fa-box-open" style="font-size: 3.5rem; color: var(--gold-bright); margin-bottom: 1.5rem;"></i>
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Das <span class="gradient-text">Ewige Lager</span></h1>
            <p style="color: var(--text-secondary);">Verwalte deine Artefakte im sicheren Zwischenraum des Drachen.</p>
            
            <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 2.5rem; border-top: 1px solid var(--border); padding-top: 2rem;">
                <button class="stash-tab-btn active" id="tabStash" onclick="switchTab('stash')">
                    <i class="fas fa-boxes"></i> Lager (<span id="countStash">0</span>/120)
                </button>
                <button class="stash-tab-btn" id="tabTrash" onclick="switchTab('trash')">
                    <i class="fas fa-trash-alt"></i> Mülleimer (<span id="countTrash">0</span>/40)
                </button>
            </div>
            
            <div style="margin-top: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem;">
                <a href="/account" class="btn secondary-btn" style="padding: 0.6rem 1.2rem; font-size: 0.85rem;">
                    <i class="fas fa-arrow-left"></i> Zum Archiv
                </a>
                
                <div id="bulkActions" style="display: none; align-items: center; gap: 1.5rem; background: rgba(0,0,0,0.3); padding: 0.75rem 1.5rem; border-radius: 12px; border: 1px solid var(--border);">
                    <label style="cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="selectAllItems" class="custom-checkbox" onchange="toggleSelectAll(this)"> Alle wählen
                    </label>
                    <button class="btn" id="bulkDeleteBtn" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); font-size: 0.85rem;" onclick="bulkDeleteItems()">
                        Markierte entfernen (<span id="selectedCount">0</span>)
                    </button>
                </div>
            </div>
        </div>

        <div id="stashGrid" class="shop-grid">
            <!-- Items via JS -->
            <div style="grid-column: 1/-1; text-align: center; padding: 5rem;">
                <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--gold-primary);"></i>
            </div>
        </div>
    </main>

    <footer class="dynamic-footer"></footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="/themes/dragon-dark/js/dragon-navbar.js"></script>
    <script src="/themes/dragon-dark/js/dragon-theme.js"></script>
    
    <script src="/js/core/modal.js"></script>
    <script src="/js/core/i18n.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/core/state.js"></script>
    <script src="/js/core/auth.js"></script>
    <script src="/js/core/main.js"></script>
    <script src="/js/core/footer.js"></script>

    <script>
        const API_URL_SEC = '/api';
        let currentView = 'stash';

        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('m2user'));
            if (!user) {
                window.location.href = '/';
                return;
            }
            loadStash();
        });

        window.switchTab = function (tab) {
            currentView = tab;
            document.querySelectorAll('.stash-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            
            const bulkBtn = document.getElementById('bulkDeleteBtn');
            if (tab === 'stash') {
                bulkBtn.innerHTML = `Markierte entfernen (<span id="selectedCount">0</span>)`;
            } else {
                bulkBtn.innerHTML = `Endgültig vernichten (<span id="selectedCount">0</span>)`;
            }
            loadStash();
        };

        async function loadStash() {
            const grid = document.getElementById('stashGrid');
            const bulk = document.getElementById('bulkActions');
            const endpoint = currentView === 'stash' ? '/stash' : '/stash/trash';
            
            try {
                const res = await fetch(`${API_URL_SEC}${endpoint}`, { headers: getAuthHeaders() });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('count' + currentView.charAt(0).toUpperCase() + currentView.slice(1)).innerText = data.items.length;
                    
                    if (data.items.length === 0) {
                        bulk.style.display = 'none';
                        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-secondary);">Keine Artefakte vorhanden.</div>`;
                        return;
                    }

                    bulk.style.display = 'flex';
                    grid.innerHTML = data.items.map(item => {
                        const date = new Date(currentView === 'stash' ? item.created_at : item.deleted_at).toLocaleDateString('de-DE');
                        const delBtn = currentView === 'stash' ? 
                            `<button class="btn" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 5px 10px; border: 1px solid rgba(239, 68, 68, 0.2);" onclick="deleteStashItem(${item.id})"><i class="fas fa-trash-alt"></i></button>` :
                            `<button class="btn" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 5px 10px; border: 1px solid rgba(239, 68, 68, 0.2);" onclick="permanentDelete(${item.id})"><i class="fas fa-times"></i></button>`;

                        return `
                        <div class="item-card glass-panel">
                            <div class="item-checkbox-container">
                                <input type="checkbox" class="stash-checkbox custom-checkbox" data-id="${item.id}" onchange="updateSelectedCount()">
                            </div>
                            <div style="position: absolute; top: 10px; right: 10px;">${delBtn}</div>
                            
                            <div class="item-icon-wrapper" style="width: 80px; height: 80px; margin-bottom: 1rem;">
                                <i class="fas fa-box" style="font-size: 2rem; color: var(--gold-bright);"></i>
                            </div>
                            
                            <h4 style="margin-bottom: 0.5rem; color: #fff;">${item.name}</h4>
                            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1rem;">Menge: x${item.count}</p>
                            <div style="font-size: 0.75rem; color: var(--gold-primary); margin-bottom: 1.5rem;">${date}</div>
                            
                            ${currentView === 'stash' ? 
                                `<button class="btn primary-btn" style="width: 100%;" onclick="claimStashItem(${item.id})">Beschwören</button>` :
                                `<button class="btn secondary-btn" style="width: 100%;" onclick="restoreItem(${item.id})">Wiederherstellen</button>`
                            }
                        </div>`;
                    }).join('');
                }
            } catch (e) { grid.innerHTML = 'Fehler beim Laden der Schatzkammer.'; }
        }

        window.updateSelectedCount = () => {
            const count = document.querySelectorAll('.stash-checkbox:checked').length;
            document.getElementById('selectedCount').innerText = count;
        };

        window.toggleSelectAll = (el) => {
            document.querySelectorAll('.stash-checkbox').forEach(cb => cb.checked = el.checked);
            updateSelectedCount();
        };

        async function claimStashItem(id) {
            customConfirm('Soll dieses Artefakt in deine Ingame-Lagerkammer beschworen werden?', async () => {
                const res = await fetch(`${API_URL_SEC}/stash/claim/${id}`, { method: 'POST', headers: getAuthHeaders() });
                const data = await res.json();
                customAlert(data.message, data.success ? 'Erfolg' : 'Fehler');
                if (data.success) loadStash();
            });
        }

        async function deleteStashItem(id) {
            customConfirm('Artefakt in den Mülleimer werfen?', async () => {
                const res = await fetch(`${API_URL_SEC}/stash/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
                const data = await res.json();
                if (data.success) loadStash();
            });
        }

        async function restoreItem(id) {
            const res = await fetch(`${API_URL_SEC}/stash/restore/${id}`, { method: 'POST', headers: getAuthHeaders() });
            const data = await res.json();
            if (data.success) loadStash();
        }

        async function permanentDelete(id) {
            customConfirm('Das Artefakt wird für IMMER zerstört!', async () => {
                const res = await fetch(`${API_URL_SEC}/stash/permanent/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
                const data = await res.json();
                if (data.success) loadStash();
            });
        }

        async function bulkDeleteItems() {
            const checked = document.querySelectorAll('.stash-checkbox:checked');
            if (checked.length === 0) return;
            const ids = Array.from(checked).map(cb => cb.dataset.id);
            const endpoint = currentView === 'stash' ? '/stash/bulk-delete' : '/stash/bulk-permanent';
            
            customConfirm(`Sollen diese ${ids.length} Artefakte entfernt werden?`, async () => {
                const res = await fetch(`${API_URL_SEC}${endpoint}`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ ids })
                });
                const data = await res.json();
                if (data.success) loadStash();
            });
        }
    </script>
</body>

</html>
