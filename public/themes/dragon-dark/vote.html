<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Dark | Vote4Coins</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/themes/dragon-dark/css/dragon-dark.css">
    <link rel="stylesheet" href="/themes/dragon-dark/css/reset-classic.css">
    <script src="/js/theme.js"></script>
</head>

<body>
    <div class="bg-overlay"></div>
    <div class="particles" id="particles-js"></div>

    <nav class="navbar"></nav>

    <main class="container" style="padding: 4rem 1.5rem; min-height: 85vh;">
        <div class="glass-panel" style="max-width: 900px; margin: 0 auto; padding: 3rem;">
            
            <div style="text-align: center; margin-bottom: 3.5rem;">
                <i class="fas fa-thumbs-up" style="font-size: 4rem; color: var(--gold-bright); margin-bottom: 1.5rem; filter: drop-shadow(0 0 15px rgba(212,160,23,0.3));"></i>
                <h1 style="font-size: 3rem; margin-bottom: 0.5rem;">Segen des <span class="gradient-text">Drachen</span></h1>
                <p style="color: var(--text-secondary); font-size: 1.1rem;">Unterstütze den Kontinent auf fernen Portalen und erhalte Drachenmünzen.</p>
            </div>

            <div id="loginPrompt" style="display: none; text-align: center; padding: 3rem; border: 1px dashed var(--border); border-radius: 16px; background: rgba(212,160,23,0.02);">
                <i class="fas fa-lock" style="font-size: 3rem; color: var(--gold-dim); margin-bottom: 1.5rem; opacity: 0.5;"></i>
                <h3 style="margin-bottom: 1rem;">Unbekannter Krieger</h3>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">Du musst deine Identität preisgeben (einloggen), um den Segen zu empfangen.</p>
                <button class="btn primary-btn" onclick="openModal('loginModal')">Jetzt Einloggen</button>
            </div>

            <div id="voteContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem;">
                <div style="grid-column: 1/-1; text-align: center; padding: 5rem;">
                    <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--gold-primary);"></i>
                </div>
            </div>
        </div>
    </main>

    <footer class="dynamic-footer"></footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="/themes/dragon-dark/js/dragon-navbar.js"></script>
    <script src="/themes/dragon-dark/js/dragon-theme.js"></script>
    
    <script src="/js/core/modal.js"></script>
    <script src="/js/core/i18n.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/core/state.js"></script>
    <script src="/js/core/auth.js"></script>
    <script src="/js/core/main.js"></script>
    <script src="/js/core/footer.js"></script>

    <script>
        async function loadVoteLinks() {
            const container = document.getElementById('voteContainer');
            const token = localStorage.getItem('m2token');
            const prompt = document.getElementById('loginPrompt');
            
            if (!token) {
                container.style.display = 'none';
                prompt.style.display = 'block';
                return;
            }

            prompt.style.display = 'none';
            container.style.display = 'grid';

            try {
                const res = await apiFetch('/votes/public');
                if (res.success) {
                    if (res.links.length === 0) {
                        container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 3rem;">Derzeit sind keine Portale verfügbar.</div>';
                        return;
                    }

                    container.innerHTML = res.links.map(link => {
                        const canVote = !link.last_vote_time || checkCooldown(link.last_vote_time, link.cooldown_hours);
                        const disabledFilter = canVote ? '' : 'filter: grayscale(100%) opacity(0.3);';
                        const btnText = canVote ? `<i class="fas fa-bolt"></i> Belohnung erhalten` : `<i class="fas fa-hourglass-half"></i> Erschöpfung`;
                        const btnClass = canVote ? 'primary-btn' : 'secondary-btn';
                        const btnAction = canVote ? `onclick="processVote(${link.id}, '${link.url}')"` : 'disabled';
                        
                        return `
                        <div class="glass-panel" style="display: flex; flex-direction: column; justify-content: space-between; padding: 2rem; border-color: ${canVote ? 'var(--border)' : 'rgba(255,255,255,0.05)'}">
                            <div style="text-align: center; margin-bottom: 1.5rem;">
                                <div style="font-weight: 700; margin-bottom: 1rem; font-family: 'Cinzel', serif; color: ${canVote ? 'var(--gold-bright)' : 'var(--text-secondary)'};">${link.title}</div>
                                <div style="background: rgba(0,0,0,0.4); border-radius: 12px; padding: 15px; display: flex; align-items: center; justify-content: center; height: 120px; border: 1px solid rgba(255,255,255,0.03);">
                                    ${link.image_url ? `<img src="${link.image_url}" style="max-width: 100%; max-height: 90px; object-fit: contain; ${disabledFilter}">` : `<i class="fas fa-link fa-2x" style="color: var(--gold-dim); ${disabledFilter}"></i>`}
                                </div>
                            </div>
                            
                            <div style="display: flex; justify-content: space-between; margin-bottom: 2rem; font-size: 0.9rem;">
                                <span style="color: var(--gold-bright);"><i class="fas fa-coins"></i> ${link.reward} DR</span>
                                <span style="color: var(--text-secondary);"><i class="fas fa-clock"></i> ${link.cooldown_hours}h</span>
                            </div>
                            
                            <button class="btn ${btnClass}" style="width: 100%;" ${btnAction}>${btnText}</button>
                        </div>`;
                    }).join('');
                }
            } catch (e) { container.innerHTML = 'Fehler beim Laden der Portale.'; }
        }

        function checkCooldown(lastVoteStr, cooldownHours) {
            const lastVote = new Date(lastVoteStr);
            const now = new Date();
            const diffHours = (now - lastVote) / (1000 * 60 * 60);
            return diffHours >= cooldownHours;
        }

        async function processVote(linkId, redirectUrl) {
            const newWin = window.open(redirectUrl, '_blank');
            const res = await apiFetch('/votes/public/vote', { method: 'POST', body: JSON.stringify({ linkId }) });
            if (res.success) {
                customAlert(res.message, 'Segen erhalten');
                loadVoteLinks();
            } else {
                customAlert(res.message, 'Fehler');
                if(newWin) newWin.close(); 
            }
        }

        document.addEventListener('DOMContentLoaded', loadVoteLinks);
    </script>
</body>

</html>
