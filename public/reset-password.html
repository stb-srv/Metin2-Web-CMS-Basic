<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort zurücksetzen | Metin2 Web</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="/js/theme.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="particles-js"></div>

    <!-- Navigation -->
    <nav class="navbar"></nav>

    <!-- Main Content -->
    <main class="container" style="padding: 4rem 2rem; min-height: 80vh; display: flex; justify-content: center; align-items: center;">
        <div class="glass-panel" style="max-width: 500px; width: 100%; padding: 2.5rem; text-align: center;">
            <i class="fas fa-key" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <h1 style="margin-bottom: 2rem;">Neues Passwort vergeben</h1>

            <form id="resetPasswordForm" style="display: none;">
                <p style="color: var(--text-muted); margin-bottom: 1.5rem; text-align: left;">Bitte gib dein neues Passwort ein (min. 5 Zeichen).</p>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="newPassword" placeholder="Neues Passwort" required minlength="5">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="newPasswordConfirm" placeholder="Neues Passwort bestätigen" required minlength="5">
                </div>
                <button type="submit" class="btn primary-btn" style="width: 100%; margin-top: 1rem;">Passwort speichern</button>
                <div id="resetMsg" class="form-msg" style="margin-top: 1rem;"></div>
            </form>

            <div id="invalidTokenMsg" style="display: none; color: var(--danger); padding: 2rem;">
                <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                <p>Der Reset-Link ist ungültig oder abgelaufen.</p>
                <a href="/" class="btn secondary-btn" style="margin-top: 1rem; display: inline-block;">Zurück zur Startseite</a>
            </div>
            
            <div id="successMsg" style="display: none; padding: 2rem;">
                <i class="fas fa-check-circle" style="font-size: 3rem; color: var(--gold); margin-bottom: 1rem;"></i>
                <h3 style="color: var(--success); margin-bottom: 1rem;">Erfolgreich!</h3>
                <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Dein Passwort wurde erfolgreich geändert.</p>
                <a href="/" class="btn primary-btn" style="display: inline-block;">Jetzt Einloggen</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="dynamic-footer"></footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="js/core/modal.js"></script>
    <script src="js/core/i18n.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/main.js"></script>
    <script src="js/core/navbar.js"></script>
    <script src="js/core/footer.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                document.getElementById('invalidTokenMsg').style.display = 'block';
                return;
            }

            const form = document.getElementById('resetPasswordForm');
            form.style.display = 'block';

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const pass1 = document.getElementById('newPassword').value;
                const pass2 = document.getElementById('newPasswordConfirm').value;
                const msgDiv = document.getElementById('resetMsg');

                if (pass1 !== pass2) {
                    msgDiv.innerHTML = "Die Passwörter stimmen nicht überein.";
                    msgDiv.className = 'form-msg msg-error';
                    return;
                }

                msgDiv.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Lade...`;
                msgDiv.className = 'form-msg';

                try {
                    const res = await apiFetch('/auth/reset-password', {
                        method: 'POST',
                        body: JSON.stringify({ token, newPassword: pass1 })
                    });

                    if (res.success) {
                        form.style.display = 'none';
                        document.getElementById('successMsg').style.display = 'block';
                    } else {
                        msgDiv.innerHTML = res.message;
                        msgDiv.className = 'form-msg msg-error';
                    }
                } catch(err) {
                    msgDiv.innerHTML = "Netzwerkfehler.";
                    msgDiv.className = 'form-msg msg-error';
                }
            });
        });
    </script>
</body>

</html>
