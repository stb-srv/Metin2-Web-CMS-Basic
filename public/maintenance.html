<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wartungsarbeiten - Metin2</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: rgba(var(--primary-rgb), 0.5);
            --accent-glow: rgba(var(--accent-rgb), 0.3);
        }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            background: radial-gradient(circle at center, rgba(var(--primary-rgb), 0.1) 0%, #0a0a0f 100%);
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }
        .bg-glow {
            position: absolute;
            width: 600px; height: 600px;
            background: var(--primary-glow);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            animation: moveGlow 10s infinite alternate;
        }
        @keyframes moveGlow {
            from { transform: translate(-100px, -100px); }
            to { transform: translate(100px, 100px); }
        }
        .maintenance-card {
            max-width: 550px;
            width: 90%;
            padding: 3.5rem 2.5rem;
            background: rgba(15, 15, 25, 0.7);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(25px);
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
            text-align: center;
            position: relative;
        }
        .icon-box {
            position: relative;
            display: inline-block;
            margin-bottom: 2.5rem;
        }
        .icon-main {
            font-size: 5.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--primary-glow));
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        h1 { font-size: 2.8rem; margin-bottom: 1rem; font-weight: 800; letter-spacing: -1px; }
        p { color: #94a3b8; font-size: 1.15rem; line-height: 1.7; margin-bottom: 2.5rem; font-weight: 300; }
        
        .status-panel {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: none; /* Shown via JS */
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            color: #e2e8f0;
        }
        .user-info b { color: var(--primary); }
        
        .badge-tag {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-tag.admin {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            width: 100%;
        }

        .btn-premium {
            padding: 1rem 1.5rem;
            border-radius: 15px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.05);
        }
        .btn-premium:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
        }
        .btn-primary:hover {
            box-shadow: 0 10px 25px rgba(var(--primary-rgb), 0.4);
        }
        .btn-danger {
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
            background: rgba(239, 68, 68, 0.05);
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }

        .footer-links {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        .footer-links a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .footer-links a:hover { color: white; }

        @media (max-width: 480px) {
            .action-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.22rem; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="maintenance-card">
        <div class="icon-box">
            <i class="fas fa-screwdriver-wrench icon-main"></i>
        </div>
        
        <h1>Wartungsarbeiten</h1>
        <p>Wir optimieren die Website für dich. In der Zwischenzeit kannst du uns auf Discord besuchen oder abwarten – wir sind bald zurück!</p>

        <div id="statusPanel" class="status-panel">
            <div class="user-info">
                <i class="fas fa-user-circle" style="font-size: 1.5rem;"></i>
                <span>Eingeloggt als <b id="usernameText">User</b></span>
                <span id="roleBadge" class="badge-tag">Spieler</span>
            </div>
            <div class="action-grid" id="statusActions">
                <!-- Dynamic Actions -->
            </div>
        </div>

        <div class="action-grid" id="defaultActions">
            <a href="#" id="discordLink" class="btn-premium" target="_blank">
                <i class="fab fa-discord" style="color: #5865F2;"></i> Discord
            </a>
            <button onclick="showLogin()" class="btn-premium btn-primary">
                <i class="fas fa-user-shield"></i> Team Login
            </button>
        </div>

        <div class="footer-links">
            <a href="/index">Startseite</a>
            <a href="mailto:support@metin2.com">Support</a>
        </div>
    </div>

    <!-- Core Logic -->
    <script src="/js/core/api.js"></script>
    <script src="/js/core/modal.js"></script>
    <script>
        async function init() {
            // Load Settings (Discord)
            try {
                const res = await fetch('/api/cms/settings');
                const data = await res.json();
                if (data.success && data.settings.discord_url) {
                    document.getElementById('discordLink').href = data.settings.discord_url;
                }
            } catch(e) {}

            updateStatus();
        }

        async function updateStatus() {
            const user = JSON.parse(localStorage.getItem('m2user'));
            const panel = document.getElementById('statusPanel');
            const defaultActions = document.getElementById('defaultActions');
            const usernameText = document.getElementById('usernameText');
            const roleBadge = document.getElementById('roleBadge');
            const statusActions = document.getElementById('statusActions');

            if (!user) {
                panel.style.display = 'none';
                defaultActions.style.display = 'grid';
                return;
            }

            // User is logged in
            panel.style.display = 'flex';
            defaultActions.style.display = 'none';
            usernameText.innerText = user.username;

            try {
                const data = await apiFetch('/admin/core/check');

                if (data.isAdmin) {
                    panel.style.display = 'flex';
                    defaultActions.style.display = 'none';
                    roleBadge.innerText = 'Team-Mitglied';
                    roleBadge.className = 'badge-tag admin';
                    statusActions.innerHTML = `
                        <a href="/admin" class="btn-premium btn-primary" style="grid-column: 1 / -1;">
                            <i class="fas fa-tachometer-alt"></i> Zum Admin Panel
                        </a>
                        <button onclick="logout()" class="btn-premium btn-danger" style="grid-column: 1 / -1; margin-top: 0.5rem; background: transparent;">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    `;
                } else {
                    panel.style.display = 'flex';
                    defaultActions.style.display = 'none';
                    roleBadge.innerText = 'Spieler';
                    roleBadge.className = 'badge-tag';
                    statusActions.innerHTML = `
                        <button onclick="showLogin()" class="btn-premium">
                            <i class="fas fa-user-shield"></i> Account wechseln
                        </button>
                        <button onclick="logout()" class="btn-premium btn-danger">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    `;
                }
            } catch (e) {
                panel.style.display = 'flex';
                defaultActions.style.display = 'none';
                statusActions.innerHTML = `<button onclick="logout()" class="btn-premium btn-danger" style="grid-column: 1 / -1;">Logout</button>`;
            }
        }

        async function showLogin() {
            const html = `
                <div style="text-align: left; display: flex; flex-direction: column; gap: 15px; padding: 10px;">
                    <div class="input-group">
                        <label style="font-size: 0.85rem; color: #94a3b8; display: block; margin-bottom: 8px;">Benutzername</label>
                        <input type="text" id="adminUser" placeholder="Draken" style="width: 100%; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px;">
                    </div>
                    <div class="input-group">
                        <label style="font-size: 0.85rem; color: #94a3b8; display: block; margin-bottom: 8px;">Passwort</label>
                        <input type="password" id="adminPass" placeholder="••••••••" style="width: 100%; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px;">
                    </div>
                    <div id="loginError" style="color: #ef4444; font-size: 0.85rem; display: none; padding: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 8px;"></div>
                    <button id="doLogin" class="btn primary-btn" style="width: 100%; border-radius: 12px; height: 50px; font-weight: 600;">Authentifizieren</button>
                </div>
            `;
            
            if (window.getGlobalModalContainer) {
                const container = window.getGlobalModalContainer();
                document.getElementById('globalModalTitle').innerText = 'Team Authentifizierung';
                document.getElementById('globalModalMessage').innerHTML = html;
                document.getElementById('globalModalActions').innerHTML = '';
                container.style.display = 'flex';
                
                document.getElementById('doLogin').onclick = async () => {
                    const btn = document.getElementById('doLogin');
                    const user = document.getElementById('adminUser').value;
                    const pass = document.getElementById('adminPass').value;
                    const err = document.getElementById('loginError');
                    
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Prüfe...';
                    
                    try {
                        const res = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: user, password: pass })
                        });
                        const data = await res.json();
                        if (data.success) {
                            localStorage.setItem('m2token', data.token);
                            localStorage.setItem('m2user', JSON.stringify(data.user));
                            document.cookie = `m2token=${data.token}; path=/; max-age=${7 * 24 * 60 * 60}; SameSite=Lax`;
                            window.location.reload();
                        } else {
                            err.innerText = data.message;
                            err.style.display = 'block';
                            btn.disabled = false;
                            btn.innerText = 'Authentifizieren';
                        }
                    } catch (e) {
                        err.innerText = 'Netzwerkfehler.';
                        err.style.display = 'block';
                        btn.disabled = false;
                        btn.innerText = 'Authentifizieren';
                    }
                };
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
