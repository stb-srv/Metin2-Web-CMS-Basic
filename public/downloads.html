<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metin2 Web | Lädt...</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="js/core/modal.js"></script>
    <script src="js/core/i18n.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/main.js"></script>

    <script src="js/core/navbar.js"></script>
    <script src="js/core/footer.js"></script>
</head>

<body>
    <div id="particles-js"></div>

    <!-- Navigation -->
    <nav class="navbar"></nav>

    <!-- Main Content -->
    <main class="container" style="padding: 4rem 2rem; min-height: 80vh;">
        <div class="glass-panel" style="max-width: 1100px; width: 100%; margin: 0 auto;">
            <h1
                style="color: var(--primary); margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; text-align: center;">
                <i class="fas fa-download"></i> Downloads
            </h1>

            <p style="text-align: center; color: var(--text-muted); margin-bottom: 3rem;">
                Lade dir hier den neuesten Metin2 Client herunter, um sofort ins Spielgeschehen einzusteigen.
            </p>

            <style>
                #downloadsContainer::-webkit-scrollbar {
                    height: 8px;
                }

                #downloadsContainer::-webkit-scrollbar-track {
                    background: rgba(0, 0, 0, 0.2);
                    border-radius: 4px;
                }

                #downloadsContainer::-webkit-scrollbar-thumb {
                    background: var(--primary);
                    border-radius: 4px;
                }

                .download-card {
                    transition: transform 0.3s ease, box-shadow 0.3s ease;
                }

                .download-card:hover {
                    transform: translateY(-5px);
                    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
                }
            </style>

            <div id="downloadsContainer"
                style="display: flex; overflow-x: auto; gap: 2rem; padding-bottom: 2rem; scroll-snap-type: x mandatory; scroll-behavior: smooth;">
                <div style="width: 100%; text-align: center; color: var(--text-muted); padding: 2rem;">
                    <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary); margin-bottom: 1rem;"></i><br>
                    Lade Downloads...
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="dynamic-footer"></footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // API_URL is already defined in main.js


        // Note: Navbar rendering and admin status check are handled by navbar.js

        async function loadPublicDownloads() {
            try {
                const res = await fetch(`${API_URL}/public/downloads`);
                const data = await res.json();
                const container = document.getElementById('downloadsContainer');

                if (data.success) {
                    container.innerHTML = '';
                    if (data.downloads.length === 0) {
                        container.innerHTML = '<div style="width: 100%; text-align: center; color: var(--text-muted); padding: 2rem;">Derzeit keine Downloads verfügbar.</div>';
                        return;
                    }

                    data.downloads.forEach(dl => {
                        const div = document.createElement('div');
                        div.className = 'glass-panel download-card';
                        div.style.flex = '0 0 auto';
                        div.style.minWidth = '260px';
                        div.style.maxWidth = '300px';
                        div.style.scrollSnapAlign = 'start';
                        div.style.padding = '2rem';
                        div.style.textAlign = 'center';
                        div.style.background = dl.bg_color || 'rgba(0,0,0,0.2)';

                        let safeUrl = dl.url;
                        if (!safeUrl.startsWith('http://') && !safeUrl.startsWith('https://') && !safeUrl.startsWith('/') && !safeUrl.startsWith('#')) {
                            safeUrl = 'https://' + safeUrl;
                        }

                        div.innerHTML = `
                            <i class="${dl.icon}" style="font-size: 3rem; color: ${dl.icon_color}; margin-bottom: 1rem;"></i>
                            <h3 style="margin-bottom: 0.5rem;">${dl.title}</h3>
                            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem; min-height: 40px;">${dl.description}</p>
                            <a href="${safeUrl}" target="_blank" class="btn primary-btn"
                                style="width: 100%; display: inline-block; text-decoration: none; border: 1px solid ${dl.icon_color}; color: ${dl.icon_color}; background: transparent; transition: all 0.3s;"
                                onmouseover="this.style.background='${dl.icon_color}'; this.style.color='#111'"
                                onmouseout="this.style.background='transparent'; this.style.color='${dl.icon_color}'">
                                <i class="fas fa-download"></i> Herunterladen
                            </a>
                        `;
                        container.appendChild(div);
                    });
                }
            } catch (err) {
                console.error('Fehler beim Laden der Downloads:', err);
                document.getElementById('downloadsContainer').innerHTML = '<div style="width: 100%; text-align: center; color: var(--danger); padding: 2rem;">Fehler beim Laden der Downloads.</div>';
            }
        }

        loadPublicDownloads();

    </script>
</body>

</html>
